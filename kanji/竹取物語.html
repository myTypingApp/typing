いまは昔、
竹取の翁といふもの有けり。
野山にまじりて竹を取りつゝ、
よろづの事に使ひけり。
名をば、さかきの造となむいひける。
その竹の中に、
もと光る竹なむ一筋ありける。
あやしがりて寄りて見るに、
筒の中光りたり。
それを見れば、
三寸ばかりなる人
いとうつくしうてゐたり。
翁いふやう、
我あさごと夕ごとに見る
竹の中におはするにて、知りぬ。
子となり給べき人なめりとて、
手にうち入れて家へ持ちて来ぬ。
妻の女にあづけて養はす。
うつくしき事かぎりなし。
いとをさなければ
籠に入れて養ふ
</textarea>
