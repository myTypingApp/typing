<textarea id="txtdata" hidden>
男もすなる
日記といふものを、
女もしてみむとて
するなり。
それの年の
しはすの二十日
あまり一日の、
戌の時に門出す。
そのよし
いささかものにかきつく
ある人県の四年五年はてて
例のことども皆しをへて、
解由など取りて
住むたちより出でて
船に乗るべき所へわたる。
かれこれ知る知らぬおくりす。
年ごろよく具しつる人共なむ
わかれ難く思ひて
その日頻にとかくしつつ
ののしるうちに夜更けぬ。</textarea>
