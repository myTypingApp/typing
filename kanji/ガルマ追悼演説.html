我々は一人の英雄を失った。
しかし、これは敗北を意味するのか？
否！始まりなのだ！
地球連邦に比べ、我がジオンの国力は
30分の1以下である。
にもかかわらず
今日まで戦い抜いてこられたのは
何故か？
諸君！我々ジオン公国の戦争目的が
正義だからだ。
これは諸君らが一番知っている。
我々は地球を追われ、
宇宙移民にさせられた。
そして、一握りのエリートが
宇宙にまで膨れ上がった地球連邦を
支配して50余年、
宇宙に住む我々が自由を要求して
何度連邦に踏みにじられたか。
ジオン公国が掲げる人類一人一人の
自由のための戦いを神が見捨てるわけはない。
私の弟、諸君らが愛してくれた
ガルマ・ザビは死んだ。
何故だ！？
新しい時代の覇権を
我ら選ばれた国民が得るのは必然である。
ならば、我らは襟を正し、
この戦局を打開しなければならぬ。
我々は過酷な宇宙空間を
生活の場としながらも共に苦悩し、
錬磨して今日の文化を築き上げてきた。
かつて、ジオン・ダイクンは人類の革新は
宇宙の民たる我々から始まると言った。
しかしながら地球連邦のモグラ共は、
自分たちが人類の支配権を有すると
増長し我々に抗戦をする。
諸君の父も、子も
その連邦の無思慮な抵抗の前に
死んでいったのだ！
この悲しみも怒りも忘れてはならない！
それを、ガルマは、死をもって
我々に示してくれた！
我々は今、この怒りを結集し、
連邦軍に叩きつけて、
初めて真の勝利を得ることができる。
この勝利こそ、
戦死者全てへの最大の慰めとなる。
国民よ！悲しみを怒りにかえて、
立てよ！国民よ！
我らジオン国国民こそ
選ばれた民であることを
忘れないでほしいのだ。
優良種たる我らこそ
人類を救い得るのである。
ジーク・ジオン！
