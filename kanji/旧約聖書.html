<textarea id="txtdata" hidden>
初めに、神は天と地を創造された。
地は形なく、空しく、
闇が大水の面にあり、
神の霊が水の面を動いていた。
神は「光あれ」と言われた。
すると光があった。
主はわたしの羊飼い。
わたしには乏しいことがない。
主はわたしを緑の牧場に伏させ、
憩いの水のほとりに伴われる。
主はわたしの魂を生き返らせ、
御名のゆえに義の道に導かれる。
わたしはあなたをエジプトの地、
奴隷の家から導き出した、
あなたの神、主である。
あなたには、わたしのほかに、
何ものも神としてはならない。
