<textarea id="txtdata" hidden>
我が忠勇なるジオン軍兵士たちよ。
今や、地球連邦軍艦隊の半数が、
我が、ソーラ・レイによって宇宙に消えた。
この輝きこそ
我らジオンの正義のあかしである。
決定的打撃を受けた地球連邦軍に、
いかほどの戦力が残っていようと、
それは、すでに、形骸である。
あえていおう、カスである！と。
それら軟弱の集団が、
このア・バオア・クーを
抜くことはできないと、
私は断言する。
人類は、我ら選ばれた
優良種たるジオン国国民に
管理運営されて、
初めて永久に
生きのびることができる。
これ以上戦いつづけては、
人類そのものの存亡に関わるのだ。
地球連邦の無能なるものどもに思い知らせ、
明日の未来のために、
我がジオン国国民は
立たねばならぬのである！
ジーク・ジオン！
