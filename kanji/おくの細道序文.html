月日は百代の
過客にして
行かふ年も
又旅人也
舟の上に
生涯をうかべ
馬の口とらえて
老をむかふる物は
日々旅にして
旅を栖とす
古人も多く
旅に死せるあり
予も
いづれの年よりか
片雲の風に
さそはれて
漂泊の 思ひやまず
海浜にさすらへ
去年の秋
江上の破屋に
蜘の古巣をはらひて
やや年も暮
春立る霞の空に
白川の関こえんと
そぞろ神の
物につきて
心をくるはせ
道祖神の
まねきにあひて
取もの手につかず
もも引の破をつづり
笠の緒付かえて
三里に灸すゆるより
松島の月
先心にかかりて
住る方は人に譲り
杉風が別墅に移るに
草の戸も
住替る代ぞ
ひなの家
面八句を
庵の柱に懸置</textarea>
