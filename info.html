<body>
<div class="info-box">
<h2 class="menu-title">練習方法</h2>
入力文字種を確認<br>
Enterキーでスタート
<br>
英数モード　直接入力してEnter<br>
かなモード　かな漢字変換をしてEnter
<br>
F11で全画面化がおすすめ<br>
英数　かな漢字変換なし 直接入力<br>
かな　かな漢字変換あり 変換してEnterで確定<br>
カタカナはCtrl+iで変換<br>
題名が違うときはCtrl+F5で<br>
キャッシュクリアして、ページを読み込み直す<br>
</div>
